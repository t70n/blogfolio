<div class="post-card">
  {% if include.post.featured_image %}
    <div class="post-card-image">
      <a href="{{ include.post.url | relative_url }}">
        <img src="{{ include.post.featured_image | relative_url }}" alt="{{ include.post.title }}" />
      </a>
    </div>
  {% endif %}
  <div class="post-card-content">
    <h3 class="post-card-title">
      <a href="{{ include.post.url | relative_url }}">{{ include.post.title }}</a>
    </h3>
    <p class="post-card-date">{{ include.post.date | date: "%B %d, %Y" }}</p>
    {% if include.post.excerpt %}
      <p class="post-card-excerpt">{{ include.post.excerpt }}</p>
    {% endif %}
    <a href="{{ include.post.url | relative_url }}" class="read-more">Read More →</a>
  </div>
</div>
